<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
		<meta http-equiv="Pragma" content="no-cache" />
		<meta http-equiv="Expires" content="0" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" type="image/png" href="img/favicon-256.png" />
		<title>Генератор цінників</title>
		<style>
			#loading.spinner {
				left: 50%;
				margin-left: -20px;
				top: 50%;
				margin-top: -20px;
				position: absolute;
				z-index: 19 !important;
				animation: loading-bar-spinner 400ms linear infinite;
			}

			#loading.spinner .spinner-icon {
				width: 40px;
				height: 40px;
				border: solid 4px transparent;
				border-top-color: #0d6efd !important;
				border-left-color: #0d6efd !important;
				border-radius: 50%;
			}

			@keyframes loading-bar-spinner {
				0% {
					transform: rotate(0deg);
					transform: rotate(0deg);
				}
				100% {
					transform: rotate(360deg);
					transform: rotate(360deg);
				}
			}
		</style>
		<script>
			window.addEventListener('load', () => {
				const strApplicationURL = "https://script.google.com/macros/s/AKfycbwfgJCPtLM96czVNpUqhbQ49VUk306_t6tuGU4DG7fGhv3Izc31Bruy0_jp4G5uwY1I/exec";
		
				const curUrl = new URL(window.location.href);
				const code = curUrl.searchParams.get("code") || "";
				const parentUrl = location.origin + location.pathname;
				const frameToken = crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random();
		
				const appUrl = new URL(strApplicationURL);
				appUrl.searchParams.set("strParent", parentUrl);
				appUrl.searchParams.set("frameToken", frameToken);
				if (code) appUrl.searchParams.set("code", code);
		
				let finished = false;
				let objIframe = null;
		
				const redirectToGoogleScript = () => {
					if (finished) return;
					finished = true;
					window.location.replace(appUrl.toString());
				};
		
				const showIframe = () => {
					if (finished) return;
					finished = true;
					clearTimeout(fallbackTimer);
		
					const loading = document.getElementById('loading');
					if (loading) loading.remove();
		
					objIframe.style.display = 'block';
		
					if (code) {
						setTimeout(() => {
							window.close();
						}, 5000);
					}
				};
		
				window.addEventListener('message', (event) => {
					const data = event.data || {};
		
					if (
						data.type === 'auchan-balisage-ready' &&
						data.frameToken === frameToken
					) {
						showIframe();
					}
				});
		
				const fallbackTimer = setTimeout(redirectToGoogleScript, 10000);
		
				objIframe = document.createElement("iframe");
				objIframe.id = "iframeWindow";
				objIframe.setAttribute(
					"style",
					"display: none; position: fixed; top: 0; left: 0; bottom: 0; right: 0; width: 100%; height: 100%; border: none; margin: 0; padding: 0; overflow: hidden; z-index: 99999"
				);
		
				objIframe.src = appUrl.toString();
				objIframe.onerror = redirectToGoogleScript;
		
				document.body.appendChild(objIframe);
			});
		</script>
	</head>
	<body>
		<div id="loading" class="spinner"><div class="spinner-icon"></div></div>
	</body>
</html>
